services:
  db:
    image: postgres:17
    ports:
      - '5440:5432'
    environment:
      POSTGRES_DB: delaykit_website
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d delaykit_website']
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
