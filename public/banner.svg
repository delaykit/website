<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1000 250"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-label="DelayKit — Durable wake-ups for TypeScript apps and agents."
>
  <title>DelayKit</title>
  <style>
    .b-stroke { stroke: #3a2c22; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .b-stroke-bold { stroke: #1c1410; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .b-stroke-accent { stroke: #b22222; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .b-fill { fill: #1c1410; }
    .b-knockout { fill: #f6efde; stroke: none; }
    .b-wordmark {
      font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.36em;
      fill: #b22222;
      text-anchor: middle;
    }
    .b-headline {
      font-family: ui-serif, "Crimson Pro", Georgia, "Times New Roman", serif;
      font-size: 24px;
      font-weight: 600;
      fill: #1c1410;
    }
    .b-subline {
      font-family: ui-serif, "Crimson Pro", Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-style: italic;
      fill: #7a6c5e;
    }
  </style>

  <!-- aged paper background -->
  <rect x="0" y="0" width="1000" height="250" fill="#f6efde" />

  <!-- cartouche: double-rule border, same language as the website plate -->
  <g class="b-stroke">
    <rect x="6" y="6" width="988" height="238" stroke-width="0.8" />
    <rect x="14" y="14" width="972" height="222" stroke-width="1.2" />
  </g>

  <!-- top knockout: punches through both border lines so the wordmark
       reads cleanly across the rules -->
  <rect class="b-knockout" x="380" y="2" width="240" height="24" />
  <text class="b-wordmark" x="500" y="22">DELAYKIT</text>

  <!-- chronometer instrument, centered around (150, 125) -->
  <g transform="translate(150 125)">
    <!-- crown -->
    <g class="b-stroke" stroke-width="1">
      <line x1="0" y1="-78" x2="0" y2="-74" />
      <rect x="-7" y="-74" width="14" height="7" fill="none" />
    </g>
    <!-- outer rim -->
    <circle cx="0" cy="0" r="70" class="b-stroke-bold" stroke-width="1.4" />
    <!-- inner bezel -->
    <circle cx="0" cy="0" r="64" class="b-stroke" stroke-width="0.7" />
    <!-- 12 tick marks (long every 90°, short between) -->
    <g class="b-stroke" stroke-width="0.9">
      <line x1="0" y1="-57" x2="0" y2="-68" stroke-width="1.4" />
      <line x1="31.5" y1="-54.6" x2="34" y2="-58.9" />
      <line x1="54.6" y1="-31.5" x2="58.9" y2="-34" />
      <line x1="57" y1="0" x2="68" y2="0" stroke-width="1.4" />
      <line x1="54.6" y1="31.5" x2="58.9" y2="34" />
      <line x1="31.5" y1="54.6" x2="34" y2="58.9" />
      <line x1="0" y1="57" x2="0" y2="68" stroke-width="1.4" />
      <line x1="-31.5" y1="54.6" x2="-34" y2="58.9" />
      <line x1="-54.6" y1="31.5" x2="-58.9" y2="34" />
      <line x1="-57" y1="0" x2="-68" y2="0" stroke-width="1.4" />
      <line x1="-54.6" y1="-31.5" x2="-58.9" y2="-34" />
      <line x1="-31.5" y1="-54.6" x2="-34" y2="-58.9" />
    </g>
    <!-- dotted inner ring -->
    <circle cx="0" cy="0" r="44" class="b-stroke" stroke-width="0.6" stroke-dasharray="1.6 3" />
    <!-- minute hand (vertical, 12 o'clock) -->
    <line x1="0" y1="0" x2="0" y2="-55" class="b-stroke-bold" stroke-width="2.2" />
    <!-- hour hand (red accent, ~2 o'clock) -->
    <line x1="0" y1="0" x2="30" y2="-17" class="b-stroke-accent" stroke-width="2.6" />
    <!-- center pin -->
    <circle cx="0" cy="0" r="4" class="b-fill" />
    <circle cx="0" cy="0" r="4" class="b-stroke" stroke-width="0.9" />
  </g>

  <!-- headline + sub-line, sit to the right of the chronometer -->
  <text class="b-headline" x="250" y="120">Durable wake-ups for TypeScript apps and agents.</text>
  <text class="b-subline" x="250" y="148">Schedule, debounce, throttle. Backed by Postgres or SQLite.</text>
</svg>
